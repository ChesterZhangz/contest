# HTTP: health check passthrough + redirect to HTTPS
server {
  listen 80;
  server_name _;

  location = /healthz {
    set $backend http://backend:3001;
    proxy_pass $backend/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS
server {
  listen 443 ssl;
  server_name contest.mareate.com;

  ssl_certificate /etc/letsencrypt/live/contest.mareate.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/contest.mareate.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 4m;

  # Use Docker's internal DNS for dynamic upstream resolution
  resolver 127.0.0.11 valid=30s ipv6=off;

  location /api/ {
    set $backend http://backend:3001;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    set $backend http://backend:3001;
    proxy_pass $backend/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location = /healthz {
    set $backend http://backend:3001;
    proxy_pass $backend/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
